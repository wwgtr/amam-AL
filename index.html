<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>أقوال الإمام علي بن أبي طالب ع</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- خلفية جسيمات -->
  <div class="particles" id="particles"></div>

  <!-- الهيدر -->
  <header class="site-header">
    <div class="header-inner">
      <div class="header-icon">☪</div>
      <h1 class="site-title">أقوال الإمام علي بن أبي طالب</h1>
      <p class="site-subtitle">عليه السلام</p>
    </div>
  </header>

  <!-- المحتوى الرئيسي -->
  <main class="main-content">

    <!-- بطاقة القول -->
    <div class="quote-wrapper">
      <div class="quote-card" id="quoteCard">
        <div class="quote-decoration top-decoration">❝</div>
        <p class="quote-text" id="quoteText">
          جاري تحميل القول...
        </p>
        <div class="quote-decoration bottom-decoration">❞</div>
        <div class="quote-divider"></div>
        <div class="quote-author">
          <span class="author-icon">🌙</span>
          <span>الإمام علي بن أبي طالب عليه السلام</span>
        </div>
      </div>
    </div>

    <!-- أزرار التحكم -->
    <div class="controls">
      <button class="btn btn-prev" id="prevBtn" title="السابق">
        <span class="btn-icon">→</span>
        <span class="btn-label">السابق</span>
      </button>

      <button class="btn btn-random" id="randomBtn" title="عشوائي">
        <span class="btn-icon">⟳</span>
        <span class="btn-label">عشوائي</span>
      </button>

      <button class="btn btn-next" id="nextBtn" title="التالي">
        <span class="btn-label">التالي</span>
        <span class="btn-icon">←</span>
      </button>
    </div>

    <!-- عداد الأقوال -->
    <div class="quote-counter">
      <span id="currentNum">1</span>
      <span class="counter-sep">/</span>
      <span id="totalNum">0</span>
    </div>

    <!-- شريط التقدم -->
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <!-- زر النسخ -->
    <div class="copy-wrap">
      <button class="btn-copy" id="copyBtn">
        📋 نسخ القول
      </button>
      <span class="copy-msg" id="copyMsg">تم النسخ!</span>
    </div>

  </main>

  <!-- الفوتر -->
  <footer class="site-footer">
    <p>﴿ وَمَا أُوتِيتُم مِّن الْعِلْمِ إِلَّا قَلِيلًا ﴾</p>
  </footer>

  <script src="quotes.js"></script>
  <script src="app.js"></script>
</body>
</html>
