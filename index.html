<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أقوال الإمام علي</title>
    <style>
        /* ============================================
           الأنماط الأساسية
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Traditional Arabic', 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            min-height: 100vh;
            transition: all 0.3s ease;
        }
        
        body.light-mode {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #333;
        }
        
        /* ============================================
           حاوية التحميل
           ============================================ */
        #loading-message {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-size: 28px;
            color: #ccc;
            font-weight: bold;
        }
        
        /* ============================================
           الحاوية الرئيسية
           ============================================ */
        #main-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            display: none;
        }
        
        /* ============================================
           العنوان
           ============================================ */
        .site-title {
            text-align: center;
            font-size: 36px;
            margin: 30px 0;
            color: #d4a843;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        body.light-mode .site-title {
            color: #8b6914;
        }
        
        /* ============================================
           بطاقة عرض القول
           ============================================ */
        #quote-display {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 50px 40px;
            margin: 20px 0;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        body.light-mode #quote-display {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(0, 0, 0, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        
        #quote-text {
            font-size: 28px;
            line-height: 2;
            margin-bottom: 25px;
            color: #fff;
            font-weight: normal;
        }
        
        body.light-mode #quote-text {
            color: #333;
        }
        
        #quote-author {
            font-size: 20px;
            color: #d4a843;
            font-style: italic;
            margin-bottom: 10px;
        }
        
        body.light-mode #quote-author {
            color: #8b6914;
        }
        
        #quote-category {
            font-size: 16px;
            color: #aaa;
            margin-bottom: 5px;
        }
        
        body.light-mode #quote-category {
            color: #666;
        }
        
        #quote-counter {
            font-size: 14px;
            color: #888;
            margin-top: 10px;
        }
        
        /* ============================================
           أزرار التحكم
           ============================================ */
        #controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 25px 0;
            flex-wrap: wrap;
        }
        
        .control-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            font-size: 16px;
            font-family: inherit;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .control-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        
        .control-btn:active {
            transform: translateY(0);
        }
        
        .control-btn.secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 0 4px 15px rgba(240, 147, 251, 0.4);
        }
        
        .control-btn.secondary:hover {
            box-shadow: 0 6px 20px rgba(240, 147, 251, 0.6);
        }
        
        .control-btn.success {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4);
        }
        
        .control-btn.success:hover {
            box-shadow: 0 6px 20px rgba(79, 172, 254, 0.6);
        }
        
        .control-btn.warning {
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            box-shadow: 0 4px 15px rgba(246, 211, 101, 0.4);
            color: #333;
        }
        
        .control-btn.warning:hover {
            box-shadow: 0 6px 20px rgba(246, 211, 101, 0.6);
        }
        
        .control-btn.danger {
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            box-shadow: 0 4px 15px rgba(161, 140, 209, 0.4);
        }
        
        .control-btn.danger:hover {
            box-shadow: 0 6px 20px rgba(161, 140, 209, 0.6);
        }
        
        .control-btn.dark {
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            box-shadow: 0 4px 15px rgba(44, 62, 80, 0.4);
        }
        
        .control-btn.dark:hover {
            box-shadow: 0 6px 20px rgba(44, 62, 80, 0.6);
        }
        
        .control-btn.info {
            background: linear-gradient(135deg, #0c3483 0%, #a2b6df 100%);
            box-shadow: 0 4px 15px rgba(12, 52, 131, 0.4);
        }
        
        .control-btn.info:hover {
            box-shadow: 0 6px 20px rgba(12, 52, 131, 0.6);
        }
        
        /* ============================================
           معلومات التحميل
           ============================================ */
        #download-info {
            text-align: center;
            margin: 15px 0;
            color: #aaa;
            font-size: 14px;
        }
        
        body.light-mode #download-info {
            color: #666;
        }
        
        /* ============================================
           أقسام الخيارات
           ============================================ */
        .section-title {
            font-size: 22px;
            margin: 30px 0 15px;
            color: #d4a843;
            text-align: center;
        }
        
        body.light-mode .section-title {
            color: #8b6914;
        }
        
        /* ============================================
           خيارات التحميل
           ============================================ */
        #download-options-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
        }
        
        .download-option {
            padding: 10px 18px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            color: #ccc;
            font-size: 14px;
            min-width: 100px;
        }
        
        .download-option:hover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
            color: #fff;
        }
        
        .download-option.selected {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.2);
            color: #fff;
            box-shadow: 0 0 15px rgba(102, 126, 234, 0.3);
        }
        
        body.light-mode .download-option {
            border-color: rgba(0, 0, 0, 0.2);
            color: #666;
            background: rgba(0, 0, 0, 0.02);
        }
        
        body.light-mode .download-option:hover {
            border-color: #667eea;
            color: #333;
        }
        
        body.light-mode .download-option.selected {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
            color: #333;
        }
        
        .download-option .option-name {
            display: block;
            font-weight: bold;
            margin-bottom: 3px;
        }
        
        .download-option .option-dims {
            display: block;
            font-size: 12px;
            color: #888;
        }
        
        /* ============================================
           الخلفيات
           ============================================ */
        #backgrounds-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 15px 0;
        }
        
        .bg-item {
            width: 100px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }
        
        .bg-item:hover {
            transform: translateY(-5px);
        }
        
        .bg-preview {
            width: 100px;
            height: 100px;
            border-radius: 12px;
            border: 3px solid transparent;
            transition: all 0.3s ease;
            margin-bottom: 5px;
        }
        
        .bg-item.selected .bg-preview {
            border-color: #d4a843;
            box-shadow: 0 0 20px rgba(212, 168, 67, 0.5);
        }
        
        .bg-item .bg-name {
            font-size: 12px;
            color: #aaa;
            display: block;
        }
        
        body.light-mode .bg-item .bg-name {
            color: #666;
        }
        
        /* ============================================
           البحث
           ============================================ */
        #search-input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 18px;
            font-family: inherit;
            margin: 20px 0;
            transition: all 0.3s ease;
            outline: none;
        }
        
        #search-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
        }
        
        #search-input::placeholder {
            color: #888;
        }
        
        body.light-mode #search-input {
            border-color: rgba(0, 0, 0, 0.2);
            background: rgba(255, 255, 255, 0.9);
            color: #333;
        }
        
        body.light-mode #search-input:focus {
            border-color: #667eea;
        }
        
        /* ============================================
           نتائج البحث
           ============================================ */
        #search-results {
            margin: 15px 0;
        }
        
        .search-result-item {
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .search-result-item:hover {
            background: rgba(102, 126, 234, 0.1);
            border-color: #667eea;
        }
        
        body.light-mode .search-result-item {
            background: rgba(0, 0, 0, 0.02);
            border-color: rgba(0, 0, 0, 0.1);
        }
        
        body.light-mode .search-result-item:hover {
            background: rgba(102, 126, 234, 0.05);
        }
        
        .search-result-item .result-text {
            font-size: 18px;
            color: #fff;
            margin-bottom: 5px;
        }
        
        body.light-mode .search-result-item .result-text {
            color: #333;
        }
        
        .search-result-item .result-category {
            font-size: 14px;
            color: #d4a843;
        }
        
        body.light-mode .search-result-item .result-category {
            color: #8b6914;
        }
        
        .no-results {
            text-align: center;
            color: #888;
            font-size: 18px;
            padding: 20px;
        }
        
        /* ============================================
           التذييل
           ============================================ */
        .footer {
            text-align: center;
            padding: 30px 0;
            color: #666;
            font-size: 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 40px;
        }
        
        body.light-mode .footer {
            border-top-color: rgba(0, 0, 0, 0.1);
        }
        
        /* ============================================
           التجاوب مع الشاشات الصغيرة
           ============================================ */
        @media (max-width: 768px) {
            #main-container {
                padding: 10px;
            }
            
            .site-title {
                font-size: 28px;
            }
            
            #quote-display {
                padding: 30px 20px;
            }
            
            #quote-text {
                font-size: 22px;
            }
            
            .control-btn {
                padding: 10px 16px;
                font-size: 14px;
            }
            
            .bg-item {
                width: 80px;
            }
            
            .bg-preview {
                width: 80px;
                height: 80px;
            }
            
            .download-option {
                min-width: 80px;
                padding: 8px 12px;
                font-size: 12px;
            }
        }
        
        @media (max-width: 480px) {
            #quote-text {
                font-size: 18px;
            }
            
            .control-btn {
                padding: 8px 12px;
                font-size: 12px;
            }
            
            .bg-item {
                width: 60px;
            }
            
            .bg-preview {
                width: 60px;
                height: 60px;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <div id="loading-message">جار التحميل...</div>
        
        <div id="main-container">
            <h1 class="site-title">أقوال الإمام علي</h1>
            
            <div id="quote-display">
                <p id="quote-text"></p>
                <p id="quote-author"></p>
                <p id="quote-category"></p>
                <p id="quote-counter"></p>
            </div>
            
            <div id="controls">
                <button id="prev-btn" class="control-btn">السابق</button>
                <button id="next-btn" class="control-btn">التالي</button>
                <button id="random-btn" class="control-btn secondary">عشوائي</button>
                <button id="favorite-btn" class="control-btn warning">اضافة للمفضلة</button>
                <button id="share-btn" class="control-btn success">مشاركة</button>
                <button id="dark-mode-btn" class="control-btn dark">وضع ليلي</button>
                <button id="download-btn" class="control-btn info">تحميل</button>
            </div>
            
            <p id="download-info"></p>
            
            <h2 class="section-title">خيارات التحميل</h2>
            <div id="download-options-container"></div>
            
            <h2 class="section-title">الخلفيات</h2>
            <div id="backgrounds-container"></div>
            
            <h2 class="section-title">البحث</h2>
            <input type="text" id="search-input" placeholder="ابحث عن قول...">
            <div id="search-results"></div>
            
            <div class="footer">
                جميع الحقوق محفوظة
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
